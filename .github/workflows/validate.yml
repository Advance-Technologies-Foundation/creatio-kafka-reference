name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  portable-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build round-trip console
        run: dotnet build tools/KafkaRoundTrip.Console/KafkaRoundTrip.Console.csproj -c Release
      - name: Build E2E test assembly without running external tests
        run: dotnet build tests/AtfKafkaReference.IntegrationTests/AtfKafkaReference.IntegrationTests.csproj -c Release
      - name: Validate committed JSON
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.json | ForEach-Object {
            Get-Content -Raw $_.FullName | ConvertFrom-Json | Out-Null
          }
      - name: Reject secrets and lab identifiers
        shell: pwsh
        run: |
          $matches = git grep -n -I -E '(BEGIN PRIVATE KEY|private_key_id|client_secret|DeloitteWorkshop|deloitte-workshop|kafka.krylov.cloud)' -- ':!*.example.json' ':!.github/workflows/validate.yml'
          if ($LASTEXITCODE -eq 0) { $matches; throw 'Potential secret or lab identifier found.' }
          if ($LASTEXITCODE -ne 1) { throw "git grep failed with exit code $LASTEXITCODE" }
          exit 0

  creatio-workspace:
    if: ${{ vars.CREATIO_REFERENCES_ARCHIVE_URL != '' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore Creatio references
        shell: pwsh
        run: |
          Invoke-WebRequest '${{ vars.CREATIO_REFERENCES_ARCHIVE_URL }}' -OutFile references.zip
          Expand-Archive references.zip -DestinationPath .application
      - name: Build workspace
        run: dotnet build MainSolution.slnx -c dev-n8
      - name: Run unit tests
        run: dotnet test tests/AtfKafkaReference/AtfKafkaReference.Tests.csproj -c dev-n8 --no-build
